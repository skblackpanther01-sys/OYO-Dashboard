<!DOCTYPE html>
<html>
<head>
<title>My Dashboard</title>
<style>
    body { font-family: Arial; margin: 0; background: #f0f2f5; }
    .container { display: flex; height: 100vh; }
    .dashboard { flex: 3; padding: 10px; }
    .chatbot { flex: 1; background: white; padding: 15px; 
               display: flex; flex-direction: column; border-left: 2px solid #ddd; }
    iframe { width: 100%; height: 92vh; border: none; border-radius: 8px; }
    #chat-box { flex: 1; overflow-y: auto; margin-bottom: 10px; }
    .msg { padding: 8px 12px; border-radius: 12px; margin: 5px 0; max-width: 90%; }
    .user { background: #0078d4; color: white; margin-left: auto; }
    .bot { background: #e8e8e8; color: #333; }
    input { width: 75%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
    button { width: 22%; padding: 8px; background: #0078d4; 
             color: white; border: none; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
<!-- POWER BI DASHBOARD -->
<div class="dashboard">
<!-- PASTE YOUR POWER BI IFRAME HERE -->
<iframe src="https://app.powerbi.com/reportEmbed?reportId=17e8ff1f-7652-4c23-81a6-82f2429ecffe&autoAuth=true&ctid=1490b17d-5dc9-4cbf-aeba-a2e854f521b8
"></iframe>
</div>
 
  <!-- AI CHATBOT -->
<div class="chatbot">
<h3>🤖 Ask About the Data</h3>
<div id="chat-box"></div>
<div>
<input id="user-input" type="text" placeholder="Ask a question..." 
             onkeydown="if(event.key==='Enter') sendMessage()" />
<button onclick="sendMessage()">Send</button>
</div>
</div>
</div>
 
<script>
  const API_KEY = "AIzaSyC1QhtRyvn-5N292L0J-3kfmWiSmCP-MIw";
  const CONTEXT = "You are an AI assistant helping users understand a Power BI dashboard. Answer questions about the data concisely.";
 
  async function sendMessage() {
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");
    const userText = input.value.trim();
    if (!userText) return;
 
    chatBox.innerHTML += `<div class="msg user">${userText}</div>`;
    input.value = "";
 
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_…,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: CONTEXT + "\n\nUser: " + userText }] }]
          })
        }
      );
      const data = await res.json();
      const reply = data.candidates[0].content.parts[0].text;
      chatBox.innerHTML += `<div class="msg bot">${reply}</div>`;
    } catch (e) {
      chatBox.innerHTML += `<div class="msg bot">Error: Could not get a response.</div>`;
    }
    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>
</body>
</html>
