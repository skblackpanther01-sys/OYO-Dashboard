<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<style>
body { font-family: Arial; margin: 0; background: #f0f2f5; }

.container { display: flex; height: 100vh; }

.dashboard { flex: 3; padding: 10px; }

.chatbot {
    flex: 1;
    background: white;
    padding: 15px;
    display: flex;
    flex-direction: column;
    border-left: 2px solid #ddd;
}

iframe {
    width: 100%;
    height: 92vh;
    border: none;
    border-radius: 8px;
}

#chat-box {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 10px;
}

.msg {
    padding: 8px 12px;
    border-radius: 12px;
    margin: 5px 0;
    max-width: 85%;
}

.user {
    background: #0078d4;
    color: white;
    margin-left: auto;
}

.bot {
    background: #e8e8e8;
    color: #333;
}

.input-area {
    display: flex;
    gap: 5px;
}

input {
    flex: 1;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
}

button {
    padding: 8px 12px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- POWER BI DASHBOARD -->
<div class="dashboard">
<iframe src="https://app.powerbi.com/reportEmbed?reportId=17e8ff1f-7652-4c23-81a6-82f2429ecffe&autoAuth=true&ctid=1490b17d-5dc9-4cbf-aeba-a2e854f521b8

"></iframe>
</div>

<!-- CHATBOT -->
<div class="chatbot">

<h3>🤖 Ask About the Data</h3>

<div id="chat-box"></div>

<div class="input-area">
<input id="user-input" type="text" placeholder="Ask a question..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>
</div>

<script>

const API_KEY = "AIzaSyC1QhtRyvn-5N292L0J-3kfmWiSmCP-MIw";

const CONTEXT = `
You are an AI assistant for a hotel analytics dashboard.

Dashboard Info:
- Total hotels: 447
- Metrics: price, rating, location
- Features: price vs rating, location comparison

Answer clearly and concisely.
`;

document.getElementById("user-input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

async function sendMessage() {

    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");

    const userText = input.value.trim();
    if (!userText) return;

    chatBox.innerHTML += `<div class="msg user">${userText}</div>`;
    input.value = "";

    try {
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [
                        {
                            parts: [
                                { text: CONTEXT + "\nUser: " + userText }
                            ]
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        let botReply = "No response received.";

        if (data.candidates && data.candidates.length > 0) {
            botReply = data.candidates[0].content.parts[0].text;
        }

        chatBox.innerHTML += `<div class="msg bot">${botReply}</div>`;

    } catch (error) {
        chatBox.innerHTML += `<div class="msg bot">⚠️ Error: ${error.message}</div>`;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
