<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f0f2f5;
}

.container {
    display: flex;
    height: 100vh;
}

.dashboard {
    flex: 3;
    padding: 10px;
}

.chatbot {
    flex: 1;
    background: white;
    padding: 15px;
    border-left: 2px solid #ddd;
    display: flex;
    flex-direction: column;
}

iframe {
    width: 100%;
    height: 95vh;
    border: none;
    border-radius: 8px;
}

#chat-box {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 10px;
}

.message {
    display: flex;
    align-items: flex-start;
    margin: 8px 0;
}

.icon {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    margin-right: 8px;
}

.user-icon { background: #0078d4; color: white; }
.bot-icon { background: #28a745; color: white; }

.msg-content { max-width: 75%; }

.name {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 2px;
}

.bubble {
    padding: 8px 12px;
    border-radius: 12px;
}

.user-bubble {
    background: #0078d4;
    color: white;
}

.bot-bubble {
    background: #e8e8e8;
    color: #333;
}

.input-area {
    display: flex;
    gap: 5px;
}

input {
    flex: 1;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
}

button {
    padding: 8px 12px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<!-- DASHBOARD -->
<div class="dashboard">
<iframe src="https://app.powerbi.com/reportEmbed?reportId=f7271de4-6434-4084-85de-fa1cc411afe8&autoAuth=true&ctid=1490b17d-5dc9-4cbf-aeba-a2e854f521b8"></iframe>
</div>

<!-- CHATBOT -->
<div class="chatbot">

<h3>🤖 AI Assistant</h3>

<div id="chat-box"></div>

<div class="input-area">
<input id="user-input" type="text" placeholder="Ask something..." />
<button id="send-btn">Send</button>
</div>

</div>
</div>

<script>

window.onload = function () {

    const input = document.getElementById("user-input");
    const button = document.getElementById("send-btn");
    const chatBox = document.getElementById("chat-box");

    function addMessage(text, sender) {

        const msgDiv = document.createElement("div");
        msgDiv.className = "message";

        const icon = document.createElement("div");
        icon.className = "icon " + (sender === "user" ? "user-icon" : "bot-icon");
        icon.innerHTML = sender === "user" ? "👤" : "🤖";

        const content = document.createElement("div");
        content.className = "msg-content";

        const name = document.createElement("div");
        name.className = "name";
        name.innerText = sender === "user" ? "You" : "AI Assistant";

        const bubble = document.createElement("div");
        bubble.className = "bubble " + (sender === "user" ? "user-bubble" : "bot-bubble");
        bubble.innerText = text;

        content.appendChild(name);
        content.appendChild(bubble);

        msgDiv.appendChild(icon);
        msgDiv.appendChild(content);

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, "user");
        input.value = "";

        const q = text.toLowerCase();
        let reply = "";

        if (q.includes("hello") || q.includes("hi") || q.includes("hey")) {
            reply = "Hello! 👋 I can help you analyze hotel performance, pricing trends, and customer ratings.";
        }
        else if (q.includes("total hotels")) {
            reply = "The dataset includes around 737 hotels across 4 major cities.";
        }
        else if (q.includes("city") || q.includes("distribution")) {
            reply = "Delhi dominates with ~447 hotels, followed by Bangalore (144), Kolkata (126), and Mumbai (20).";
        }
        else if (q.includes("price")) {
            reply = "Average price is ₹2.10K. Mumbai is highest (~₹2.53K) while Bangalore is lowest (~₹1.35K).";
        }
        else if (q.includes("rating")) {
            reply = "Average rating is ~608/1000. Mid-range hotels often outperform expensive ones in ratings.";
        }
        else if (q.includes("value") || q.includes("price vs rating")) {
            reply = "Mid-range hotels offer the best value — higher prices don’t always guarantee better ratings.";
        }
        else if (q.includes("best")) {
            reply = "Bangalore and Kolkata provide the best balance of affordability and customer satisfaction.";
        }
        else if (q.includes("worst")) {
            reply = "Some high-priced hotels, especially in Mumbai, show lower relative ratings.";
        }
        else if (q.includes("trend")) {
            reply = "Prices vary widely across cities, but ratings remain relatively stable.";
        }
        else if (q.includes("business") || q.includes("insight")) {
            reply = "Focus on mid-range high-rated hotels, expand in Delhi, and optimize pricing in premium markets like Mumbai.";
        }
        else if (q.includes("compare")) {
            reply = "Delhi leads in volume, Bangalore in affordability, and Mumbai in premium pricing.";
        }
        else if (q.includes("recommend")) {
            reply = "Choose mid-range hotels in Bangalore/Kolkata. Businesses should target high-demand regions.";
        }
        else if (q.includes("thank") || q.includes("thanks")) {
            reply = "You're welcome 😊 Ask more for deeper insights!";
        }
        else {
            reply = "Try asking about price, rating, city comparison, or business insights.";
        }

        setTimeout(() => addMessage(reply, "bot"), 400);
    }

    button.addEventListener("click", sendMessage);

    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });

};

</script>

</body>
</html>
