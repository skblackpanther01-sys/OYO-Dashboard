<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<style>
body { font-family: Arial; margin: 0; }
.container { display: flex; height: 100vh; }
.dashboard { flex: 3; }
.chatbot { flex: 1; padding: 10px; border-left: 2px solid #ccc; display: flex; flex-direction: column; }
iframe { width: 100%; height: 100%; border: none; }
#chat-box { flex: 1; overflow-y: auto; }
.msg { margin: 5px; padding: 8px; border-radius: 8px; }
.user { background: blue; color: white; text-align: right; }
.bot { background: #eee; }
</style>
</head>

<body>

<div class="container">

<div class="dashboard">
<iframe src="https://app.powerbi.com/reportEmbed?reportId=17e8ff1f-7652-4c23-81a6-82f2429ecffe&autoAuth=true&ctid=1490b17d-5dc9-4cbf-aeba-a2e854f521b8"></iframe>
</div>

<div class="chatbot">

<h3>Chatbot</h3>

<div id="chat-box"></div>

<input id="user-input" type="text" placeholder="Type here..." />
<button id="send-btn">Send</button>

</div>

</div>

<script>

// Button click
document.getElementById("send-btn").addEventListener("click", sendMessage);

// Enter key
document.getElementById("user-input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

function sendMessage() {
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");

    const text = input.value.trim();
    if (!text) return;

    chatBox.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";

    let reply = "I'm analyzing the dashboard data...";

    if (text.toLowerCase().includes("price")) {
        reply = "The dashboard shows variation in hotel prices across different locations, helping identify pricing trends.";
    } 
    else if (text.toLowerCase().includes("rating")) {
        reply = "Ratings indicate customer satisfaction and can be compared with pricing to evaluate performance.";
    } 
    else if (text.toLowerCase().includes("location")) {
        reply = "You can use the location filter to compare hotel performance across different regions.";
    } 
    else if (text.toLowerCase().includes("best")) {
        reply = "Hotels with higher ratings and moderate pricing tend to perform better in this dataset.";
    } 
    else {
        reply = "This dashboard enables comparative analysis of hotels based on price, rating, and location.";
    }

    chatBox.innerHTML += `<div class="msg bot">${reply}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>
</body>
</html>
