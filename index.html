<script>

window.onload = function () {

    const input = document.getElementById("user-input");
    const button = document.getElementById("send-btn");
    const chatBox = document.getElementById("chat-box");

    function sendMessage() {

        const text = input.value.trim();
        if (!text) return;

        chatBox.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";

        const q = text.toLowerCase();
        let reply = "";

        // Greetings
        if (q.includes("hello") || q.includes("hi") || q.includes("hey")) {
            reply = "Hello! 👋 I'm here to help you understand the dashboard.";
        }

        // Hotels
        else if (q.includes("hotel")) {
            reply = "The dashboard contains data for a total of 447 hotels.";
        }

        // Price
        else if (q.includes("price")) {
            reply = "The average price is approximately 2.10K.";
        }

        // Rating
        else if (q.includes("rating")) {
            reply = "The average rating is around 608.49.";
        }

        // Location
        else if (q.includes("location")) {
            reply = "You can compare hotel performance across different locations using filters.";
        }

        else {
            reply = "Try asking about hotels, price, rating, or location.";
        }

        chatBox.innerHTML += `<div class="msg bot">${reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Button click
    button.onclick = sendMessage;

    // Enter key
    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });

};

</script>
