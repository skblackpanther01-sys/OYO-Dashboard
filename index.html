<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<style>
body { font-family: Arial; margin: 0; }
.container { display: flex; height: 100vh; }
.dashboard { flex: 3; }
.chatbot { flex: 1; padding: 10px; border-left: 2px solid #ccc; display: flex; flex-direction: column; }
iframe { width: 100%; height: 100%; border: none; }
#chat-box { flex: 1; overflow-y: auto; }
.msg { margin: 5px; padding: 8px; border-radius: 8px; }
.user { background: blue; color: white; text-align: right; }
.bot { background: #eee; }
</style>
</head>

<body>

<div class="container">

<div class="dashboard">
<iframe src="https://app.powerbi.com/reportEmbed?reportId=17e8ff1f-7652-4c23-81a6-82f2429ecffe&autoAuth=true&ctid=1490b17d-5dc9-4cbf-aeba-a2e854f521b8"></iframe>
</div>

<div class="chatbot">

<h3>Chatbot</h3>

<div id="chat-box"></div>

<input id="user-input" type="text" placeholder="Type here..." />
<button id="send-btn">Send</button>

</div>

</div>

<script>

// 🔴 PUT YOUR API KEY HERE
const API_KEY = "AIzaSyC1QhtRyvn-5N292L0J-3kfmWiSmCP-MIw";

// Button click event
document.getElementById("send-btn").addEventListener("click", sendMessage);

// Enter key event
document.getElementById("user-input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

async function sendMessage() {

    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");

    const text = input.value.trim();
    if (!text) return;

    chatBox.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";

    try {
        const res = await fetch(
            "`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_…
            {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: "Answer briefly: " + text }]
                    }]
                })
            }
        );

        const data = await res.json();
        console.log(data);

        let reply = "No response";

        if (data.candidates) {
            reply = data.candidates[0].content.parts[0].text;
        }

        chatBox.innerHTML += `<div class="msg bot">${reply}</div>`;

    } catch (err) {
        chatBox.innerHTML += `<div class="msg bot">Error</div>`;
    }

}
</script>

</body>
</html>
