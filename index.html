<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<style>
body { font-family: Arial; margin: 0; }
.container { display: flex; height: 100vh; }
.dashboard { flex: 3; }
.chatbot { flex: 1; padding: 10px; border-left: 2px solid #ccc; display: flex; flex-direction: column; }
iframe { width: 100%; height: 100%; border: none; }
#chat-box { flex: 1; overflow-y: auto; }
.msg { margin: 5px; padding: 8px; border-radius: 8px; }
.user { background: blue; color: white; text-align: right; }
.bot { background: #eee; }
</style>
</head>

<body>

<div class="container">

<div class="dashboard">
<iframe src="https://app.powerbi.com/reportEmbed?reportId=17e8ff1f-7652-4c23-81a6-82f2429ecffe&autoAuth=true&ctid=1490b17d-5dc9-4cbf-aeba-a2e854f521b8"></iframe>
</div>

<div class="chatbot">

<h3>Chatbot</h3>

<div id="chat-box"></div>

<input id="user-input" type="text" placeholder="Type here..." />
<button id="send-btn">Send</button>

</div>

</div>

<script>
function sendMessage() {
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");

    const text = input.value.trim();
    if (!text) return;

    chatBox.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";

    const q = text.toLowerCase();
    let reply = "";

    // Dynamic logic
    if (q.includes("price") && q.includes("rating")) {
        reply = "There is a noticeable relationship between price and rating. Higher-priced hotels often show better ratings, but there are exceptions indicating value-for-money options.";
    } 
    else if (q.includes("price")) {
        reply = "Hotel prices vary significantly across locations. Some regions offer budget-friendly options while others have premium pricing trends.";
    } 
    else if (q.includes("rating")) {
        reply = "Ratings reflect customer satisfaction. Higher ratings generally indicate better service quality and customer experience.";
    } 
    else if (q.includes("location") || q.includes("city") || q.includes("state")) {
        reply = "Using the location filter, you can compare how hotels perform across different regions and identify high-performing areas.";
    } 
    else if (q.includes("best") || q.includes("top")) {
        reply = "The best-performing hotels are those with a balance of high ratings and reasonable pricing, offering strong value to customers.";
    } 
    else if (q.includes("compare")) {
        reply = "This dashboard allows comparative analysis of hotels across price, rating, and location to identify performance differences.";
    } 
    else if (q.includes("insight") || q.includes("analysis")) {
        reply = "Key insights include pricing trends, customer satisfaction patterns, and regional performance variations across hotels.";
    } 
    else {
        // Random smart responses (makes it feel AI)
        const responses = [
            "The dashboard provides useful insights into hotel performance across different metrics.",
            "You can explore trends by interacting with filters and visualizations.",
            "This analysis helps in understanding pricing strategies and customer preferences.",
            "The data highlights variations in hotel performance across regions.",
            "Try asking about price, rating, or location for more specific insights."
        ];
        reply = responses[Math.floor(Math.random() * responses.length)];
    }

    // Typing effect (AI feel)
    const botDiv = document.createElement("div");
    botDiv.className = "msg bot";
    chatBox.appendChild(botDiv);

    let i = 0;
    function typeEffect() {
        if (i < reply.length) {
            botDiv.innerHTML += reply.charAt(i);
            i++;
            setTimeout(typeEffect, 15);
        }
    }
    typeEffect();

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
